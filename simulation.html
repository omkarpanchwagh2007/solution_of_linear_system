<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Linear System Visualizer · 2D & 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #header {
            background: white;
            padding: 12px 24px;
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            z-index: 20;
            flex-shrink: 0;
        }
        #header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 8px;
        }
        #controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            font-weight: 500;
            color: #475569;
            font-size: 14px;
        }
        select,
        input {
            padding: 6px 12px;
            border: 1.5px solid #cbd5e1;
            border-radius: 20px;
            font-size: 14px;
            background: white;
            color: #1e293b;
            outline: none;
        }
        select:focus,
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
        button {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: white;
            border: 1.5px solid #cbd5e1;
            color: #1e293b;
            transition: all 0.15s;
        }
        button.primary {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        button.primary:hover {
            background: #2563eb;
        }
        button.primary:disabled {
            background: #94a3b8;
            border-color: #94a3b8;
            color: #e2e8f0;
            cursor: not-allowed;
            opacity: 0.7;
        }
        button:hover {
            background: #f1f5f9;
        }
        button.learn-btn {
            background: #8b5cf6;
            border-color: #8b5cf6;
            color: white;
            font-weight: 600;
            animation: pulse-btn 2s infinite;
        }
        @keyframes pulse-btn {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(139, 92, 246, 0);
            }
        }
        button.learn-btn:hover {
            background: #7c3aed;
        }
        button.plot-ready {
            background: #10b981;
            border-color: #10b981;
            color: white;
            font-weight: 700;
            animation: pulse-plot 1.8s infinite;
        }
        @keyframes pulse-plot {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
        }
        button.plot-ready:hover {
            background: #059669;
        }
        .badge {
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        .badge.independent {
            background: #dcfce7;
            color: #166534;
        }
        .badge.dependent {
            background: #fef9c3;
            color: #854d0e;
        }
        .badge.inconsistent {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge.unknown {
            background: #f1f5f9;
            color: #64748b;
        }
        #eq-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-left: auto;
        }
        .eq-card {
            background: #f1f5f9;
            border-radius: 30px;
            padding: 4px 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #cbd5e1;
        }
        .coeff-input {
            width: 55px;
            padding: 4px;
            text-align: center;
            border-radius: 15px;
            border: 1px solid #cbd5e1;
            font-size: 12px;
        }
        .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        #main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        #graph-container {
            flex: 1;
            position: relative;
            background: white;
            min-width: 0;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .graph-legend {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(6px);
            border-radius: 18px;
            padding: 12px 16px;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid #cbd5e1;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            pointer-events: none;
            z-index: 25;
            min-width: 210px;
            max-width: 280px;
        }
        .graph-legend .legend-title {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1e293b;
            margin-bottom: 8px;
            border-bottom: 2px solid #cbd5e1;
            display: inline-block;
            width: 100%;
        }
        .legend-status {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 4px 10px;
            margin-bottom: 12px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            font-family: system-ui;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 11px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .legend-text {
            color: #1e293b;
            word-break: break-word;
        }

        #info-sidebar {
            width: 300px;
            background: white;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
        }
        .section-title {
            font-weight: 600;
            color: #1e293b;
            margin: 16px 0 8px;
            font-size: 14px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 6px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .eq-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        .eq-text {
            font-family: monospace;
            font-size: 13px;
        }
        .point-item {
            font-size: 13px;
            padding: 4px 0;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .point-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            margin-top: 4px;
            flex-shrink: 0;
        }
        .verify-box {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .hover-coords {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            font-size: 12px;
            white-space: nowrap;
            max-width: 200px;
        }
        .info-bar {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 16px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            font-size: 12px;
            color: #475569;
            pointer-events: none;
            z-index: 20;
        }
        .point-panel {
            position: absolute;
            bottom: 20px;
            right: 320px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 30;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
        }
        .point-panel label {
            color: white;
            font-weight: 500;
            font-size: 13px;
        }
        .point-input {
            width: 70px;
            padding: 5px 8px;
            border-radius: 40px;
            border: none;
            background: white;
            font-family: monospace;
            font-size: 12px;
            text-align: center;
        }
        .add-point-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }
        .clear-points-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }
        @media (max-width: 800px) {
            .point-panel {
                right: 10px;
                bottom: 10px;
                padding: 6px 12px;
                gap: 6px;
            }
            .point-input {
                width: 55px;
            }
        }

        /* ===== STEP-BY-STEP SOLVER MODAL ===== */
        #solver-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #solver-overlay.active {
            display: flex;
        }
        #solver-modal {
            background: white;
            border-radius: 24px;
            width: 90vw;
            max-width: 750px;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        #solver-header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        #solver-header h2 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        #solver-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #solver-close:hover {
            background: rgba(255, 255, 255, 0.35);
        }
        #solver-progress {
            display: flex;
            gap: 6px;
            padding: 12px 24px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            align-items: center;
        }
        .step-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .step-dot.completed {
            background: #10b981;
            color: white;
        }
        .step-dot.current {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.2);
            animation: dotPulse 1.5s infinite;
        }
        @keyframes dotPulse {
            0%,
            100% {
                box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(59, 130, 246, 0);
            }
        }
        .step-dot.wrong {
            background: #ef4444;
            color: white;
        }
        .phase-indicator {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .phase-indicator.input-phase {
            background: #fef3c7;
            color: #92400e;
            animation: pulse-phase 1.8s infinite;
        }
        @keyframes pulse-phase {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.35);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(245, 158, 11, 0);
            }
        }
        .phase-indicator.solving-phase {
            background: #dcfce7;
            color: #166534;
        }
        #solver-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .matrix-container {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            display: inline-block;
            align-self: center;
            font-family: 'Courier New', monospace;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        .matrix-container table {
            border-collapse: collapse;
        }
        .matrix-container td {
            padding: 8px 16px;
            text-align: center;
            color: #e2e8f0;
            font-size: 16px;
            font-weight: 600;
            border-right: 2px solid transparent;
        }
        .matrix-container td.augment-bar {
            border-right: 3px solid #f59e0b;
            padding-right: 20px;
        }
        .matrix-container td.after-bar {
            padding-left: 20px;
        }
        .matrix-container .row-highlight {
            background: rgba(59, 130, 246, 0.2);
            border-radius: 6px;
        }
        .matrix-container .pivot-cell {
            color: #fbbf24;
            font-weight: 800;
        }
        .matrix-container .zero-cell {
            color: #10b981;
            font-weight: 800;
        }

        .matrix-container input.matrix-cell-input {
            width: 70px;
            padding: 6px 8px;
            text-align: center;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            background: #334155;
            color: #f1f5f9;
            border: 2px solid #475569;
            border-radius: 8px;
            transition: 0.2s;
            outline: none;
        }
        .matrix-container input.matrix-cell-input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
            background: #3b4f6b;
            color: #fff;
        }
        .matrix-container input.matrix-cell-input.const-cell {
            border-color: #f59e0b;
            background: #3b3b2f;
        }
        .matrix-container input.matrix-cell-input.const-cell:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.2);
        }
        .matrix-container .row-label {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 700;
            padding-right: 10px;
            text-align: right;
            min-width: 30px;
        }

        #solver-instruction {
            font-size: 14px;
            color: #475569;
            text-align: center;
            font-weight: 500;
            line-height: 1.5;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 4px solid #3b82f6;
        }
        #solver-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        #solver-inputs input {
            width: 90px;
            padding: 10px 14px;
            text-align: center;
            font-size: 15px;
            font-family: monospace;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            transition: 0.2s;
            background: #fafafa;
        }
        #solver-inputs input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
            background: white;
        }
        #solver-inputs input.input-wrong {
            border-color: #ef4444;
            background: #fef2f2;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-6px);
            }
            75% {
                transform: translateX(6px);
            }
        }
        #solver-inputs input.input-correct {
            border-color: #10b981;
            background: #f0fdf4;
        }
        #solver-inputs .input-label {
            font-weight: 600;
            color: #1e293b;
            font-size: 14px;
            white-space: nowrap;
        }
        #solver-feedback {
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            min-height: 28px;
            padding: 8px 12px;
            border-radius: 10px;
            transition: 0.3s;
        }
        #solver-feedback.fb-correct {
            background: #dcfce7;
            color: #166534;
        }
        #solver-feedback.fb-wrong {
            background: #fee2e2;
            color: #991b1b;
        }
        #solver-feedback.fb-info {
            background: #e0f2fe;
            color: #075985;
        }
        #solver-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        #solver-buttons button {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        #btn-check {
            background: #3b82f6;
            color: white;
        }
        #btn-check:hover {
            background: #2563eb;
        }
        #btn-hint {
            background: #f59e0b;
            color: #1e293b;
        }
        #btn-hint:hover {
            background: #d97706;
            color: white;
        }
        #btn-next {
            background: #10b981;
            color: white;
        }
        #btn-next:hover {
            background: #059669;
        }
        #btn-goto-graph {
            background: #8b5cf6;
            color: white;
            font-weight: 700;
            padding: 12px 28px;
            font-size: 15px;
        }
        #btn-goto-graph:hover {
            background: #7c3aed;
        }
        #btn-start-solving {
            background: #f59e0b;
            color: #1e293b;
            font-weight: 700;
            padding: 14px 32px;
            font-size: 16px;
            animation: pulse-start 2s infinite;
        }
        @keyframes pulse-start {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5);
            }
            50% {
                box-shadow: 0 0 0 16px rgba(245, 158, 11, 0);
            }
        }
        #btn-start-solving:hover {
            background: #d97706;
            color: white;
        }
        #solver-final {
            text-align: center;
            padding: 16px;
        }
        .final-solution {
            font-size: 20px;
            font-weight: 700;
            color: #1e3a8a;
            font-family: monospace;
            background: #eff6ff;
            display: inline-block;
            padding: 10px 24px;
            border-radius: 30px;
        }
        #btn-skip-graph {
            background: transparent;
            border: 1.5px solid #cbd5e1;
            color: #64748b;
            font-size: 12px;
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 20px;
            margin-top: 6px;
        }
        #btn-skip-graph:hover {
            background: #f1f5f9;
            color: #1e293b;
        }
        .hint-explanation {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            color: #92400e;
            line-height: 1.5;
            margin-top: 8px;
            text-align: left;
            display: block;
        }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="header">
        <h1>📐 Linear System Visualizer</h1>
        <div id="controls">
            <div class="ctrl-group"><label>Mode:</label><select id="modeSelect"><option value="2d">2D (x, y)</option><option value="3d">3D (x, y, z)</option></select></div>
            <div class="ctrl-group" id="numEqGroup"><label>Equations:</label><select id="numEqSelect"><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></div>
            <button onclick="generateRandom()">🎲 Generate</button>
            <button id="plotBtn" class="primary" onclick="plotSystem()" disabled title="Complete the step-by-step solver first">📊 Plot</button>
            <button class="learn-btn" onclick="openSolver()">🧠 Learn Step-by-Step</button>
            <button onclick="resetView()">↺ Reset</button>
            <span id="statusBadge" class="badge unknown">Unknown</span>
            <div id="eq-inputs"></div>
        </div>
    </div>
    <div id="main-area">
        <div id="graph-container">
            <canvas id="canvas2d"></canvas>
            <div id="hoverCoords" class="hover-coords" style="display:none;"></div>
            <div class="info-bar" id="infoBar">🖱️ Enter coefficients above · Then click "Learn Step-by-Step"</div>
            <div id="graphLegend" class="graph-legend"><div class="legend-title">📐 System</div><div class="legend-status">—</div><div class="legend-title">Equations</div></div>
            <div class="point-panel" id="pointPanel">
                <label>📍 Add point:</label>
                <input type="number" id="ptX" class="point-input" placeholder="x" value="1.0" step="any"> <span style="color:white;">,</span>
                <input type="number" id="ptY" class="point-input" placeholder="y" value="1.0" step="any">
                <span id="zLabel" style="color:white;">,</span>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const LINE_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
        let mode = '2d',
            numEqs = 2;
        let equations = [],
            intersections = null,
            status = 'unknown';
        let customPoints = [];
        let plotUnlocked = false;

        // 3D globals
        let scene3d, camera3d, renderer3d, labelRenderer, controls3d, animId3d;
        let intersectionLabelObj = null;
        let customMarkerGroup = null;
        let planeObjects = [];

        // ==================== MATH & SOLVERS ====================
        function solve2D(eqs) {
            const pts = [];
            for (let i = 0; i < eqs.length; i++)
                for (let j = i + 1; j < eqs.length; j++) {
                    const e1 = eqs[i],
                        e2 = eqs[j];
                    const det = e1.a * e2.b - e2.a * e1.b;
                    if (Math.abs(det) < 1e-10) continue;
                    const x = (e1.c * e2.b - e2.c * e1.b) / det;
                    const y = (e1.a * e2.c - e2.a * e1.c) / det;
                    if (isFinite(x) && isFinite(y)) pts.push({ x, y, from: [eqs[i].label, eqs[j].label] });
                }
            return pts;
        }

        function classify2D(eqs) {
            if (eqs.length < 2) return 'unknown';
            const pts = solve2D(eqs);
            if (eqs.length === 2) {
                const det = eqs[0].a * eqs[1].b - eqs[1].a * eqs[0].b;
                if (Math.abs(det) < 1e-10) {
                    const c1 = eqs[0].a * eqs[1].c - eqs[1].a * eqs[0].c;
                    const c2 = eqs[0].b * eqs[1].c - eqs[1].b * eqs[0].c;
                    return (Math.abs(c1) < 1e-10 && Math.abs(c2) < 1e-10) ? 'dependent' : 'inconsistent';
                }
                return 'independent';
            }
            if (pts.length === 0) return 'inconsistent';
            const allSame = pts.every(p => Math.abs(p.x - pts[0].x) < 1e-6 && Math.abs(p.y - pts[0].y) < 1e-6);
            return allSame ? 'independent' : 'inconsistent';
        }

        function solve3DGeneral(eqs) {
            if (eqs.length < 3) return null;
            const n = eqs.length;
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    for (let k = j + 1; k < n; k++) {
                        const e1 = eqs[i],
                            e2 = eqs[j],
                            e3 = eqs[k];
                        const A = [
                            [e1.a, e1.b, e1.c],
                            [e2.a, e2.b, e2.c],
                            [e3.a, e3.b, e3.c]
                        ];
                        const b = [e1.d, e2.d, e3.d];
                        const det = A[0][0] * (A[1][1] * A[2][2] - A[1][2] * A[2][1]) -
                            A[0][1] * (A[1][0] * A[2][2] - A[1][2] * A[2][0]) +
                            A[0][2] * (A[1][0] * A[2][1] - A[1][1] * A[2][0]);
                        if (Math.abs(det) < 1e-8) continue;
                        const x = (b[0] * (A[1][1] * A[2][2] - A[1][2] * A[2][1]) - A[0][1] * (b[1] * A[2][2] - A[
                            1][2] * b[2]) + A[0][2] * (b[1] * A[2][1] - A[1][1] * b[2])) / det;
                        const y = (A[0][0] * (b[1] * A[2][2] - A[1][2] * b[2]) - b[0] * (A[1][0] * A[2][2] - A[1][2] * A[
                            2][0]) + A[0][2] * (A[1][0] * b[2] - b[1] * A[2][0])) / det;
                        const z = (A[0][0] * (A[1][1] * b[2] - b[1] * A[2][1]) - A[0][1] * (A[1][0] * b[2] - b[1] * A[2][
                            0
                        ]) + b[0] * (A[1][0] * A[2][1] - A[1][1] * A[2][0])) / det;
                        if (!isFinite(x) || !isFinite(y) || !isFinite(z)) continue;
                        let consistent = true;
                        for (let eq of eqs) {
                            const lhs = eq.a * x + eq.b * y + eq.c * z;
                            if (Math.abs(lhs - eq.d) > 1e-5) { consistent = false; break; }
                        }
                        if (consistent) return { x, y, z, from: eqs.map(e => e.label) };
                    }
                }
            }
            return null;
        }

        function getDefaultEqs3D(count) {
            const basePoint = { x: 2, y: 1, z: 1 };
            const presets = [];
            for (let i = 0; i < count; i++) {
                let a = (i === 0 ? 1 : (i === 1 ? 2 : (i === 2 ? -1 : (i === 3 ? 3 : -2))));
                let b = (i === 0 ? 2 : (i === 1 ? -1 : (i === 2 ? 1 : (i === 3 ? 1 : 2))));
                let c = (i === 0 ? 1 : (i === 1 ? 1 : (i === 2 ? 2 : (i === 3 ? -1 : 1))));
                if (i === 4) { a = 1;
                    b = -2;
                    c = 1; }
                const d = a * basePoint.x + b * basePoint.y + c * basePoint.z;
                presets.push({ a, b, c, d, color: LINE_COLORS[i % LINE_COLORS.length],
                    label: `P${String.fromCharCode(8320+i+1)}` });
            }
            return presets.slice(0, count);
        }

        function getDefaultEqs2D(count) {
            const defMap = {
                2: [{ a: 1, b: 1, c: 4 }, { a: 2, b: -1, c: 2 }],
                3: [{ a: 1, b: 1, c: 4 }, { a: 2, b: -1, c: 2 }, { a: 1, b: -2, c: -1 }],
                4: [{ a: 1, b: 1, c: 4 }, { a: 2, b: -1, c: 2 }, { a: 1, b: -2, c: -1 }, { a: 3, b: 1, c: 7 }],
                5: [{ a: 1, b: 1, c: 4 }, { a: 2, b: -1, c: 2 }, { a: 1, b: -2, c: -1 }, { a: 3, b: 1, c: 7 }, { a: 2,
                    b: 3, c: 9 }]
            };
            const eqs = defMap[count] || defMap[2];
            return eqs.map((e, i) => ({ ...e, color: LINE_COLORS[i % LINE_COLORS.length],
                label: `L${String.fromCharCode(8320+i+1)}` }));
        }

        function updatePlotButtonState() {
            const plotBtn = document.getElementById('plotBtn');

        function updateGraphLegend() {
            const legendDiv = document.getElementById('graphLegend');
            if (!legendDiv) return;

                statusBg = '#f1f5f9',

                statusBg = '#dcfce7';
                statusColor = '#166534'; } else if (status === 'dependent') { statusText =
                    '♾️ Dependent — Infinite Solutions';
                statusBg = '#fef9c3';
                statusColor = '#854d0e'; } else if (status === 'inconsistent') { statusText =
                    '❌ Inconsistent — No Solution';
                statusBg = '#fee2e2';
                statusColor = '#991b1b'; } else { statusText = '⏳ Unknown / Not solved';
                statusBg = '#e2e8f0';
                statusColor = '#475569'; }
            let eqHtml =
                `<div class="legend-title">📐 ${mode==='2d'?'Lines':'Planes'} legend</div>`;
            equations.forEach(eq => {
                let expr = mode === '2d' ? `${eq.a}x + ${eq.b}y = ${eq.c}` :
                    `${eq.a}x + ${eq.b}y + ${eq.c}z = ${eq.d}`;
                expr = expr.replace(/\+ -/g, '- ');
                eqHtml +=
                    `<div class="legend-item"><div class="legend-color" style="background:${eq.color}"></div><div class="legend-text">${eq.label}: ${expr}</div></div>`;
            });
            legendDiv.innerHTML =
                `<div class="legend-title">📊 System Status</div>
                               <div class="legend-status" style="background:${statusBg}; color:${statusColor}">${statusText}</div>
                               ${eqHtml}`;
        }

        function buildEqInputs() {
            const div = document.getElementById('eq-inputs');
            div.innerHTML = '';
            equations.forEach((eq, i) => {
                const card = document.createElement('div');
                card.className = 'eq-card';

                    <input class="coeff-input" type="number" step="any" value="${eq.b}" data-i="${i}" data-f="b"><span> y = </span>
                    <input class="coeff-input" type="number" step="any" value="${eq.c}" data-i="${i}" data-f="c">`;
                } else {
                    card.innerHTML =
                        `<span class="color-dot" style="background:${eq.color}"></span>
                    <input class="coeff-input" type="number" step="any" value="${eq.a}" data-i="${i}" data-f="a" style="width:48px"><span>x +</span>
                    <input class="coeff-input" type="number" step="any" value="${eq.b}" data-i="${i}" data-f="b" style="width:48px"><span>y +</span>
                    <input class="coeff-input" type="number" step="any" value="${eq.c}" data-i="${i}" data-f="c" style="width:48px"><span>z =</span>

            div.querySelectorAll('input').forEach(inp => {
                inp.addEventListener('change', () => {
                    const idx = +inp.dataset.i,

                });

        }

        function updateStatusUI() {
            const badge = document.getElementById('statusBadge');
            const sidebar = document.getElementById('sidebarStatus');
            badge.className = 'badge ' + status;
            badge.textContent = status.charAt(0).toUpperCase() + status.slice(1);

                dependent: { bg: '#fef9c3', color: '#854d0e', text: '♾️ Dependent — Infinite Solutions' },
                inconsistent: { bg: '#fee2e2', color: '#991b1b', text: '❌ Inconsistent — No Solution' },

        function updateSidebars() {
            const eqDiv = document.getElementById('sidebarEqs');
            eqDiv.innerHTML = equations.map(eq => {
                let txt = mode === '2d' ? `${eq.a}x + ${eq.b}y = ${eq.c}` :
                    `${eq.a}x + ${eq.b}y + ${eq.c}z = ${eq.d}`;
                return `<div class="eq-item"><span class="color-dot" style="background:${eq.color}"></span><span class="eq-text">${eq.label}: ${txt}</span></div>`;
            }).join('');
            const ptDiv = document.getElementById('sidebarPoints');
            if (mode === '2d') {
                const pts = intersections || [];
                if (pts.length) ptDiv.innerHTML = pts.map(pt =>
                    `<div class="point-item"><span class="point-dot"></span><div><div style="font-family:monospace;">(${pt.x.toFixed(4)}, ${pt.y.toFixed(4)})</div><div>${pt.from[0]} ∩ ${pt.from[1]}</div></div></div>`
                    ).join('');
                else ptDiv.innerHTML = '<p style="font-size:12px;">No intersections</p>';
            } else {
                if (intersections && intersections.x !== undefined) ptDiv.innerHTML =
                    `<div class="point-item"><span class="point-dot"></span><div>(${intersections.x.toFixed(4)}, ${intersections.y.toFixed(4)}, ${intersections.z.toFixed(4)})<div>${intersections.from.join(' ∩ ')}</div></div></div>`;
                else ptDiv.innerHTML = '<p>No unique intersection</p>';
            }
            const verifySec = document.getElementById('verifySection');
            const verifyDiv = document.getElementById('sidebarVerify');
            if ((mode === '2d' && intersections?.length) || (mode === '3d' && intersections)) {
                verifySec.style.display = 'block';
                if (mode === '2d') verifyDiv.innerHTML = intersections.map(pt =>
                    `<div class="verify-box">Point (${pt.x.toFixed(2)}, ${pt.y.toFixed(2)})<br>${equations.map(e=>`${e.label}: ${(e.a*pt.x+e.b*pt.y).toFixed(2)} = ${e.c} ${Math.abs(e.a*pt.x+e.b*pt.y-e.c)<0.01?'✅':'❌'}`).join('<br>')}</div>`
                    ).join('');
                else if (intersections) verifyDiv.innerHTML =
                    `<div class="verify-box">Point (${intersections.x.toFixed(2)}, ${intersections.y.toFixed(2)}, ${intersections.z.toFixed(2)})<br>${equations.map(e=>`${e.label}: ${(e.a*intersections.x+e.b*intersections.y+e.c*intersections.z).toFixed(2)} = ${e.d} ${Math.abs(e.a*intersections.x+e.b*intersections.y+e.c*intersections.z-e.d)<0.01?'✅':'❌'}`).join('<br>')}</div>`;
            } else verifySec.style.display = 'none';
            const customTitle = document.getElementById('customPointsTitle');
            const customListDiv = document.getElementById('customPointsList');
            if (customPoints.length) {
                customTitle.style.display = 'block';
                customListDiv.innerHTML = customPoints.map(pt =>
                    `<div class="point-item"><span class="point-dot" style="background:#f97316;"></span><div>(${pt.x.toFixed(3)}, ${pt.y.toFixed(3)}${pt.z!==undefined?', '+pt.z.toFixed(3):''})<div style="font-size:10px;">${pt.label}</div></div></div>`
                    ).join('');
            } else { customTitle.style.display = 'none';
                customListDiv.innerHTML = ''; }
        }

        // ========== 2D CANVAS ==========
        let view = { cx: 0, cy: 0, scale: 40 },
            dragging = false,
            lastMouse = { x: 0, y: 0 };

        function toScreen(wx, wy, canvas) { return { sx: canvas.width / 2 + (wx - view.cx) * view.scale, sy: canvas
                    .height / 2 - (wy - view.cy) * view.scale }; }

        function toWorld(sx, sy, canvas) { return { wx: (sx - canvas.width / 2) / view.scale + view.cx, wy: -(sy - canvas
                    .height / 2) / view.scale + view.cy }; }

        function draw2D() {
            const canvas = document.getElementById('canvas2d');
            if (!canvas || mode !== '2d') return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width,
                H = canvas.height;
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, W, H);
            const wl = toWorld(0, 0, canvas).wx,
                wr = toWorld(W, 0, canvas).wx,
                wt = toWorld(0, 0, canvas).wy,
                wb = toWorld(0, H, canvas).wy;
            const step = Math.pow(10, Math.floor(Math.log10(Math.max(wr - wl, wt - wb) / 8)));
            const gridStep = step > 0.5 ? Math.round(step) || 1 : step;
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let x = Math.floor(wl / gridStep) * gridStep; x <= wr; x += gridStep) { let { sx } = toScreen(x, 0,
                    canvas);
                ctx.beginPath();
                ctx.moveTo(sx, 0);
                ctx.lineTo(sx, H);
                ctx.stroke(); }
            for (let y = Math.floor(wb / gridStep) * gridStep; y <= wt; y += gridStep) { let { sy } = toScreen(0, y,
                    canvas);
                ctx.beginPath();
                ctx.moveTo(0, sy);
                ctx.lineTo(W, sy);
                ctx.stroke(); }
            const o = toScreen(0, 0, canvas);
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, o.sy);
            ctx.lineTo(W, o.sy);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(o.sx, 0);
            ctx.lineTo(o.sx, H);
            ctx.stroke();
            equations.forEach(eq => {
                ctx.strokeStyle = eq.color;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                if (Math.abs(eq.b) > 1e-10)
                    for (let px = 0; px <= W; px += 2) { let { wx } = toWorld(px, 0, canvas);
                        let wy = (eq.c - eq.a * wx) / eq.b;
                        let { sy } = toScreen(wx, wy, canvas);
                        px === 0 ? ctx.moveTo(px, sy) : ctx.lineTo(px, sy); } else if (Math.abs(eq.a) > 1e-10) { let wx =
                        eq.c / eq.a;
                    let { sx } = toScreen(wx, 0, canvas);
                    ctx.moveTo(sx, 0);
                    ctx.lineTo(sx, H); }
                ctx.stroke();
            });
            (Array.isArray(intersections) ? intersections : []).forEach(pt => {
                const { sx, sy } = toScreen(pt.x, pt.y, canvas);
                ctx.beginPath();
                ctx.arc(sx, sy, 10, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(239,68,68,0.15)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(sx, sy, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444';
                ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.font = 'bold 11px monospace';
                ctx.fillText(`(${pt.x.toFixed(2)}, ${pt.y.toFixed(2)})`, sx + 12, sy - 8);
            });
            customPoints.forEach(pt => {
                const { sx, sy } = toScreen(pt.x, pt.y, canvas);
                ctx.beginPath();
                ctx.arc(sx, sy, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#f97316';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });
        }

        function resize2D() { const canvas = document.getElementById('canvas2d'); if (!canvas) return; const rect = canvas
                .parentElement.getBoundingClientRect();
            canvas.width = rect.width * devicePixelRatio;
            canvas.height = rect.height * devicePixelRatio;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            canvas.getContext('2d').scale(devicePixelRatio, devicePixelRatio);
            draw2D(); }

        // ========== 3D scene ==========
        function cleanup3D() {
            if (animId3d) cancelAnimationFrame(animId3d);
            if (renderer3d) { renderer3d.dispose();
                renderer3d.domElement.remove();
                renderer3d = null; }
            if (labelRenderer) { labelRenderer.domElement.remove();
                labelRenderer = null; }
            if (controls3d) controls3d.dispose();
            if (scene3d) {
                scene3d.traverse(obj => {
                    if (obj.isMesh) { obj.geometry?.dispose(); if (obj.material) obj.material.dispose(); }
                    if (obj.isLineSegments) { obj.geometry?.dispose();
                        obj.material?.dispose(); }
                });
                scene3d = null;
            }
            intersectionLabelObj = null;
            customMarkerGroup = null;
        }

        function setup3D() {
            cleanup3D();
            const container = document.getElementById('graph-container');
            const canvas2d = document.getElementById('canvas2d');
            canvas2d.style.display = 'none';
            scene3d = new THREE.Scene();
            scene3d.background = new THREE.Color(0xffffff);
            camera3d = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera3d.up.set(0, 0, 1);
            camera3d.position.set(10, 10, 8);
            renderer3d = new THREE.WebGLRenderer({ antialias: true });
            renderer3d.setSize(container.clientWidth, container.clientHeight);
            renderer3d.setClearColor(0xffffff, 1);
            container.appendChild(renderer3d.domElement);
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(container.clientWidth, container.clientHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            container.appendChild(labelRenderer.domElement);
            controls3d = new OrbitControls(camera3d, renderer3d.domElement);
            controls3d.enableDamping = true;
            controls3d.rotateSpeed = 1.2;
            const ambient = new THREE.AmbientLight(0x404060, 0.65);
            scene3d.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.9);
            mainLight.position.set(8, 10, 5);
            scene3d.add(mainLight);
            const fillLight = new THREE.PointLight(0xccddff, 0.35);
            fillLight.position.set(-2, 3, 4);
            scene3d.add(fillLight);
            const gridHelper = new THREE.GridHelper(16, 20, 0xa1a1aa, 0xd4d4d8);
            gridHelper.rotation.x = Math.PI / 2;
            gridHelper.position.z = -0.02;
            scene3d.add(gridHelper);
            const axesHelper = new THREE.AxesHelper(7);
            scene3d.add(axesHelper);
            equations.forEach(eq => {
                const normal = new THREE.Vector3(eq.a, eq.b, eq.c).normalize();
                const planeSize = 9;
                const geometry = new THREE.PlaneGeometry(planeSize, planeSize);
                const material = new THREE.MeshPhongMaterial({
                    color: eq.color,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.28,
                    depthWrite: false
                });
                const mesh = new THREE.Mesh(geometry, material);
                const denom = eq.a * eq.a + eq.b * eq.b + eq.c * eq.c;
                if (denom > 1e-8) {
                    const t = eq.d / denom;

            });

        function generateSolverStepsFromMatrix(matrixValues) {
            if (mode === '2d') {
                if (matrixValues.length < 2) return null;
                const [r1, r2] = matrixValues;
                let a1 = r1[0],
                    b1 = r1[1],
                    c1 = r1[2];
                let a2 = r2[0],
                    b2 = r2[1],
                    c2 = r2[2];

                }
                if (Math.abs(a1) < 1e-10) return null;

                const m = round4(a2 / a1);
                const b2p = round4(b2 - m * b1);
                const c2p = round4(c2 - m * c1);

                if (Math.abs(b2p) < 1e-10) {
                    if (Math.abs(c2p) < 1e-10) {
                        return { type: 'dependent', message: 'This system is dependent (infinite solutions).' };
                    } else {
                        return { type: 'inconsistent', message: 'This system is inconsistent (no solution).' };
                    }

                const ySol = round4(c2p / b2p);
                const xSol = round4((c1 - b1 * ySol) / a1);

                const steps = [
                    { id: 1, title: 'Display Augmented Matrix', matrix: [
                            [a1, b1, c1],
                            [a2, b2, c2]
                        ], instruction: 'Step 1: Observe the augmented matrix of the system.',

                    { id: 2, title: 'Find Multiplier m',
                        matrix: [

                            [a2, b2, c2]
                        ],
                        instruction: `Step 2: To eliminate x from Row 2, compute multiplier <b>m = a₂/a₁</b>. Enter m where <b>R₂ ← R₂ − m·R₁</b>.`,
                        explanation: `We want to eliminate the x-variable from Row 2 to create an upper triangular matrix. The multiplier "m" tells us how many times we need to subtract Row 1 from Row 2. Since Row 1 has ${a1.toFixed(2)}x and Row 2 has ${a2.toFixed(2)}x, dividing ${a2.toFixed(2)}/${a1.toFixed(2)} = ${m.toFixed(4)} tells us exactly how many Row 1's we need to cancel out Row 2's x-term.`,
                        inputs: [{ label: 'm =', key: 'm' }], expected: [m], hintValues: [m], highlightRow: 1,
                        pivotCol: 0, zeroCells: [], isObserve: false },
                    { id: 3, title: 'Eliminate x from R₂',
                        matrix: [
                            [a1, b1, c1],
                            [0, b2p, c2p]
                        ],
                        instruction: `Step 3: Apply R₂ ← R₂ − ${m.toFixed(4)}·R₁. Enter the <b>new Row 2</b> coefficients (b₂' and c₂').`,
                        explanation: `Now we perform the actual elimination. For each coefficient in Row 2, we subtract ${m.toFixed(4)} times the corresponding coefficient in Row 1. For b₂': ${b2.toFixed(2)} − ${m.toFixed(4)} × ${b1.toFixed(2)} = ${b2p.toFixed(4)}. For c₂': ${c2.toFixed(2)} − ${m.toFixed(4)} × ${c1.toFixed(2)} = ${c2p.toFixed(4)}. Notice the x-coefficient becomes 0 (${a2.toFixed(2)} − ${m.toFixed(4)} × ${a1.toFixed(2)} = 0), creating the triangular form we need.`,
                        inputs: [{ label: "b₂' =", key: 'b2p' }, { label: "c₂' =", key: 'c2p' }],
                        expected: [b2p, c2p], hintValues: [b2p, c2p], highlightRow: 1, pivotCol: 1,
                        zeroCells: [{ r: 1, c: 0 }], isObserve: false },
                    { id: 4, title: 'Solve for y',
                        matrix: [
                            [a1, b1, c1],
                            [0, b2p, c2p]
                        ],
                        instruction: `Step 4: From Row 2: <b>${b2p.toFixed(4)}y = ${c2p.toFixed(4)}</b>, solve for <b>y</b>.`,
                        explanation: `With the matrix in upper triangular form, Row 2 now represents a simple equation: ${b2p.toFixed(4)}y = ${c2p.toFixed(4)}. To find y, we simply divide both sides by ${b2p.toFixed(4)}. This is the power of Gaussian elimination—we've transformed a system of two equations into a single equation with one unknown.`,

        function renderSolverStep() {
            solverPhase = 'elimination';
            if (solverType !== 'independent') {
                solverMatrix.innerHTML = '';
                solverInstruction.textContent = solverMessage;
                solverInputs.innerHTML = '';
                solverFeedback.textContent = '';
                solverFeedback.className = '';
                solverExplanation.style.display = 'none';
                solverButtons.innerHTML =
                    '<button id="btn-goto-graph" onclick="closeSolverAndPlot()">📊 Go to Graph Plotting</button>';
                solverFinal.innerHTML = '';
                solverProgress.innerHTML =
                    '<span style="color:#991b1b;font-weight:600;">⚠️ ' + solverMessage + '</span>';
                return;
            }
            if (currentStepIdx >= solverSteps.length) {
                renderSolverComplete();
                return;
            }
            const step = solverSteps[currentStepIdx];
            solverMatrix.innerHTML = buildMatrixHTML(step.matrix, step.highlightRow, step.pivotCol, step.zeroCells);
            solverInstruction.innerHTML = step.instruction;
            solverFeedback.textContent = '';
            solverFeedback.className = '';
            solverExplanation.style.display = 'none';
            solverExplanation.innerHTML = '';
            currentAttempts = 0;

            solverProgress.innerHTML =
                '<span class="phase-indicator solving-phase">🔢 Phase 2: Gaussian Elimination</span>';
            updateProgressDots(currentStepIdx);

            let inputsHTML = '';
            step.inputs.forEach((inp, i) => {
                inputsHTML +=
                    `<span class="input-label">${inp.label}</span>
                 <input type="number" step="any" id="solver-inp-${i}" class="solver-input-field" placeholder="?" autocomplete="off">`;
            });
            solverInputs.innerHTML = inputsHTML;

            let btnsHTML = '';
            if (step.isObserve) {
                btnsHTML +=
                    '<button id="btn-next" onclick="solverNextStep()">✅ Got it — Next Step →</button>';
            } else {
                btnsHTML += '<button id="btn-check" onclick="solverCheckAnswer()">✅ Check Answer</button>';
                btnsHTML += '<button id="btn-hint" onclick="solverShowHint()">💡 Hint</button>';
            }
            solverButtons.innerHTML = btnsHTML;
            solverFinal.innerHTML = '';

            setTimeout(() => {
                const firstInp = document.querySelector('.solver-input-field');
                if (firstInp) firstInp.focus();
            }, 150);

            document.querySelectorAll('.solver-input-field').forEach(inp => {
                inp.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') solverCheckAnswer();
                });
            });
        }

        function solverCheckAnswer() {
            if (currentStepIdx >= solverSteps.length) return;
            const step = solverSteps[currentStepIdx];
            if (step.isObserve) { solverNextStep(); return; }
            currentAttempts++;
            let allCorrect = true;
            const wrongIndices = [];
            step.inputs.forEach((inp, i) => {
                const el = document.getElementById('solver-inp-' + i);
                if (!el) { allCorrect = false;
                    wrongIndices.push(i); return; }
                const userVal = parseFloat(el.value);
                const expected = step.expected[i];
                if (isNaN(userVal) || Math.abs(userVal - expected) > 0.005) {
                    allCorrect = false;
                    wrongIndices.push(i);
                    el.classList.add('input-wrong');
                    el.classList.remove('input-correct');
                } else {
                    el.classList.remove('input-wrong');
                    el.classList.add('input-correct');
                }
            });
            if (allCorrect) {
                solverFeedback.textContent = '✅ Correct! Great job! Moving to next step...';
                solverFeedback.className = 'fb-correct';
                solverExplanation.style.display = 'none';
                document.querySelectorAll('.solver-input-field').forEach(el => el.disabled = true);
                document.getElementById('btn-check').style.display = 'none';
                if (document.getElementById('btn-hint')) document.getElementById('btn-hint').style.display = 'none';
                solverButtons.innerHTML =
                    '<button id="btn-next" onclick="solverNextStep()">✅ Next Step →</button>';
                updateProgressDot(currentStepIdx, 'completed');
            } else {
                const wrongLabels = wrongIndices.map(i => step.inputs[i].label.replace('=', '').trim()).join(', ');
                solverFeedback.textContent =
                    `❌ Incorrect. Check: ${wrongLabels}. Attempt ${currentAttempts}. Please try again.`;
                solverFeedback.className = 'fb-wrong';
                solverExplanation.style.display = 'none';
                updateProgressDot(currentStepIdx, 'wrong');
                setTimeout(() => {
                    document.querySelectorAll('.solver-input-field').forEach(el => el.classList.remove(
                        'input-wrong'));
                    if (wrongIndices.length > 0) {
                        const firstWrong = document.getElementById('solver-inp-' + wrongIndices[0]);
                        if (firstWrong) { firstWrong.focus();
                            firstWrong.select(); }
                    }
                }, 600);
            }
        }

        function solverShowHint() {
            if (currentStepIdx >= solverSteps.length) return;
            const step = solverSteps[currentStepIdx];
            if (step.isObserve) { solverNextStep(); return; }
            step.inputs.forEach((inp, i) => {
                const el = document.getElementById('solver-inp-' + i);
                if (el) {
                    el.value = step.hintValues[i].toFixed(4);
                    el.classList.add('input-correct');
                    el.classList.remove('input-wrong');
                    el.disabled = true;
                }
            });
            solverFeedback.textContent = '💡 Hint used! The correct values are shown. Click Next to continue.';
            solverFeedback.className = 'fb-info';
           
            if (step.explanation) {
                solverExplanation.innerHTML = '<div class="hint-explanation">📖 <b>Why?</b> ' + step.explanation + '</div>';
                solverExplanation.style.display = 'block';
            } else {
                solverExplanation.style.display = 'none';
            }
           
            document.getElementById('btn-check').style.display = 'none';
            if (document.getElementById('btn-hint')) document.getElementById('btn-hint').style.display = 'none';
            solverButtons.innerHTML = '<button id="btn-next" onclick="solverNextStep()">✅ Next Step →</button>';
            updateProgressDot(currentStepIdx, 'completed');
        }

        function solverNextStep() {
            currentStepIdx++;
            if (currentStepIdx >= solverSteps.length) {
                renderSolverComplete();
            } else {
                renderSolverStep();
            }
        }

        function renderSolverComplete() {
            solverPhase = 'complete';
            solverMatrix.innerHTML = '';
            solverInstruction.textContent = '🎉 Congratulations! You\'ve completed the step-by-step solution!';
            solverInputs.innerHTML = '';
            solverFeedback.textContent = '';
            solverFeedback.className = '';
            solverExplanation.style.display = 'none';
            solverProgress.innerHTML =
                '<span class="phase-indicator solving-phase" style="background:#dcfce7;color:#166534;">✅ Complete!</span>';
            let solHTML = '';
            if (solverSolution) {
                if (mode === '2d') {
                    solHTML =
                        `<div class="final-solution">x = ${solverSolution.x.toFixed(4)}, y = ${solverSolution.y.toFixed(4)}</div>`;
                } else {
                    solHTML =
                        `<div class="final-solution">x = ${solverSolution.x.toFixed(4)}, y = ${solverSolution.y.toFixed(4)}, z = ${solverSolution.z.toFixed(4)}</div>`;
                }
            }
            solverFinal.innerHTML = solHTML +
                '<br><br><button id="btn-goto-graph" onclick="closeSolverAndPlot()">📊 View Graph Plotting</button>';
            solverButtons.innerHTML = '';
            const dots = solverProgress.querySelectorAll('.step-dot');
            dots.forEach(d => d.classList.add('completed'));
        }

        function updateProgressDots(currentIdx) {
            const totalSteps = solverSteps.length;
            let html = '<span class="phase-indicator solving-phase">🔢 Phase 2: Gaussian Elimination</span>';
            for (let i = 0; i < totalSteps; i++) {
                let cls = 'step-dot';
                if (i < currentIdx) cls += ' completed';
                else if (i === currentIdx) cls += ' current';
                html += `<span class="${cls}">${i+1}</span>`;
            }
            solverProgress.innerHTML = html;
        }

        function updateProgressDot(idx, statusClass) {
            const dots = solverProgress.querySelectorAll('.step-dot');
            if (idx >= 0 && idx < dots.length) {
                dots[idx].classList.remove('current', 'wrong', 'completed');
                if (statusClass === 'completed') dots[idx].classList.add('completed');
                else if (statusClass === 'wrong') dots[idx].classList.add('wrong');
                else dots[idx].classList.add('current');
            }
        }

        window.openSolver = function() {
            solverPhase = 'matrix-input';
            solverSteps = [];
            solverSolution = null;
            solverType = 'independent';
            solverMessage = '';
            currentStepIdx = 0;
            currentAttempts = 0;
            solverMatrixValues = null;
            renderMatrixInput();
            solverOverlay.classList.add('active');
        };

        window.closeSolverAndPlot = function() {
            solverOverlay.classList.remove('active');
            unlockPlot();
            if (solverSolution && solverType === 'independent') {
                if (mode === '2d') {
                    intersections = [{ x: solverSolution.x, y: solverSolution.y, from: [equations[0]?.label || 'R1',
                            equations[1]?.label || 'R2'
                        ] }];
                    status = 'independent';
                    draw2D();
                } else {
                    intersections = { x: solverSolution.x, y: solverSolution.y, z: solverSolution.z, from: equations
                            .slice(0, 3).map(e => e.label) };
                    status = 'independent';
                    setup3D();
                }
                updateStatusUI();
                updateSidebars();
                document.getElementById('infoBar').textContent = mode === '2d' ?
                    '🖱️ Drag to pan · Scroll to zoom' : '🖱️ Drag to rotate · Scroll to zoom';
            } else {
                plotSystem();
            }
            solverData = null;
        };

        solverClose.addEventListener('click', () => {
            solverOverlay.classList.remove('active');
            solverData = null;
        });
        solverOverlay.addEventListener('click', function(e) {
            if (e.target === solverOverlay) {
                solverOverlay.classList.remove('active');
                solverData = null;
            }
        });

        window.solverCheckAnswer = solverCheckAnswer;
        window.solverShowHint = solverShowHint;
        window.solverNextStep = solverNextStep;
        window.startSolvingFromMatrix = window.startSolvingFromMatrix;
        window.skipToGraph = window.skipToGraph;
    </script>
</body>
</html>
